<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Crochet Pal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #EFEAE2; font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #root { display: flex; align-items: center; justify-content: center; }
    *::-webkit-scrollbar { width: 0; height: 0; }
    button:active { transform: scale(0.98); }
    input[type=range] { -webkit-appearance: none; appearance: none; height: 6px; background: rgba(31,26,44,0.1); border-radius: 999px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: #1F1A2C; cursor: pointer; box-shadow: 0 2px 6px rgba(31,26,44,0.25); border: 3px solid #FFF8F0; }
    input[type=range]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: #1F1A2C; cursor: pointer; border: 3px solid #FFF8F0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="react.js"></script>
  <script src="react-dom.js"></script>
  <script src="ios-frame.js"></script>
  <script src="tweaks-panel.js"></script>
  <script src="data.js"></script>
  <script src="ui.js"></script>
  <script src="screens-a.js"></script>
  <script src="screens-b.js"></script>
  <script src="app.js"></script>
</body>
</html>
